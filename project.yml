name: ShoppingList
options:
  bundleIdPrefix: com.nese.shoppinglist
targets:
  ShoppingList:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShoppingList
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nese.shoppinglist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
  ShoppingListTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: ShoppingListTests
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: ShoppingList
schemes:
  ShoppingList:
    build:
      targets:
        ShoppingList: all
        ShoppingListTests: [test]
    test:
      targets:
        - ShoppingListTests
